version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: planningpoker-postgres
    restart: always
    environment:
      POSTGRES_USER: planningpoker
      POSTGRES_PASSWORD: planningpoker
      POSTGRES_DB: planningpoker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U planningpoker']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - planningpoker-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: planningpoker-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://planningpoker:planningpoker@postgres:5432/planningpoker?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - planningpoker-network
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3001/health']
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: planningpoker-nginx
    restart: always
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - planningpoker-network

volumes:
  postgres_data:

networks:
  planningpoker-network:
    driver: bridge
